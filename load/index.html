<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Lovia</title><style>html,body{margin:0;height:100%;background:#f4ede2;font-family:-apple-system,system-ui,sans-serif}#ld{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8a7a55;font-size:15px;text-align:center;padding:24px}</style></head><body><div id="ld">Загрузка…</div><script>
(function(){
  fetch('assets/app.js',{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.text(); })
    .then(function(h){ document.open(); document.write(h); document.close(); })
    .catch(function(e){ document.getElementById('ld').textContent='Не удалось загрузить ('+e.message+'). Открой ссылку в Safari/Chrome.'; });
})();
</script></body></html>
