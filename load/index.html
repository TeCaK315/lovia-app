<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Lovia</title><style>html,body{margin:0;height:100%;background:#f4ede2}#f{border:0;width:100%;height:100%;display:block}#ld{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8a7a55;font-family:-apple-system,system-ui,sans-serif;font-size:15px;text-align:center;padding:24px}</style></head><body><div id="ld">Загрузка…</div><iframe id="f" allow="camera;microphone;clipboard-write" hidden></iframe><script>
fetch('assets/app.js',{cache:'no-store'})
 .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.text(); })
 .then(function(h){ var f=document.getElementById('f'); f.srcdoc=h; f.hidden=false; var ld=document.getElementById('ld'); if(ld) ld.remove(); })
 .catch(function(e){ var ld=document.getElementById('ld'); if(ld) ld.textContent='Не удалось загрузить ('+e.message+'). Открой ссылку в обычном Safari/Chrome.'; });
</script></body></html>
